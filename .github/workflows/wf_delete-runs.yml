name: Cleanup Workflow Runs
on:
  schedule:
    - cron: '* * * * *' # Versucht jede Minute zu laufen

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Zwingend erforderlich für Löschrechte
    steps:
      - name: Delete old runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0          # Löscht unabhängig vom Alter
          keep_minimum_runs: 3    # Behält exakt die neuesten 3 Läufe
